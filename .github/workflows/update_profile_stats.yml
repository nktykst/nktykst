name: Update profile stats

on:
  schedule:
    # JST 06:00 = UTC 21:00
    - cron: '0 21 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    env:
      PROFILE_STATS_URL: ${{ secrets.PROFILE_STATS_URL }}
      PROFILE_LANGUAGES_URL: ${{ secrets.PROFILE_LANGUAGES_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch stats SVGs from self-hosted API
        run: |
          set -euo pipefail
          mkdir -p img
          ts=$(date +%s)
          # append a cache-busting timestamp so Vercel/Camo returns fresh data
          curl -fsSL "${PROFILE_STATS_URL}&_ts=${ts}"     -o img/profile_stats.svg
          curl -fsSL "${PROFILE_LANGUAGES_URL}&_ts=${ts}" -o img/profile_languages.svg

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add img/profile_stats.svg img/profile_languages.svg
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m ":art: update profile stats"
            git push
          fi
